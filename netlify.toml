# Netlify configuration for Next.js 16+ with security fixes
[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = ".next"
  
[build.environment]
  NODE_VERSION = "22.14.0"
  # Force npm instead of pnpm
  NPM_FLAGS = "--legacy-peer-deps"
  # Explicitly set framework to prevent auto-detection issues
  NETLIFY_FRAMEWORK = "nextjs"

# Next.js specific redirects and headers
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Production environment variables
[context.production.environment]
  NODE_ENV = "production"